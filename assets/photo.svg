<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#1a1025"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d78c"/>
      <stop offset="100%" style="stop-color:#d4a853"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="160" r="60" fill="url(#gold)" opacity="0.3"/>
  <circle cx="200" cy="150" r="45" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>
  <ellipse cx="200" cy="280" rx="80" ry="50" fill="url(#gold)" opacity="0.2"/>
  <text x="200" y="360" text-anchor="middle" fill="#d4a853" font-family="Georgia, serif" font-size="18" opacity="0.7">Votre photo ici</text>
</svg>
